services:
  # Kafka broker in KRaft mode (no ZooKeeper)
  kafka:
    image: confluentinc/cp-kafka:8.2.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 5s
      retries: 5

  # Confluent Schema Registry — the connectors serialize with Avro
  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.1
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: curl --fail http://localhost:8081/subjects
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Connect — installs ONLY the two Debezium connectors this demo needs:
  #   * debezium-connector-sqlserver  (the CDC source)
  #   * debezium-connector-jdbc       (the JDBC sink, with native identity insert)
  # plus the Avro converter and the Microsoft SQL Server JDBC driver.
  # No custom connector and no Confluent JDBC connector are involved.
  kafka-connect:
    image: confluentinc/cp-kafka-connect:8.2.1
    hostname: kafka-connect
    container_name: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: kafka-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      CONNECT_LOG4J_LOGGERS: org.reflections=ERROR
    command:
      - bash
      - -c
      - |
        set -e
        echo "Installing Debezium SQL Server source connector (CDC)..."
        confluent-hub install --no-prompt debezium/debezium-connector-sqlserver:latest
        echo "Installing Debezium JDBC sink connector..."
        confluent-hub install --no-prompt debezium/debezium-connector-jdbc:latest
        echo "Installing Avro converter..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-avro-converter:8.2.1
        echo "Adding the Microsoft SQL Server JDBC driver to the sink plugin..."
        curl -fsSL -o /usr/share/confluent-hub-components/debezium-debezium-connector-jdbc/lib/mssql-jdbc-12.8.1.jre11.jar \
          https://repo1.maven.org/maven2/com/microsoft/sqlserver/mssql-jdbc/12.8.1.jre11/mssql-jdbc-12.8.1.jre11.jar
        echo "Starting Kafka Connect..."
        /etc/confluent/docker/run
    healthcheck:
      test: curl --fail http://localhost:8083/connectors
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  # Source SQL Server — CDC is enabled here (requires SQL Server Agent)
  sqlserver-source:
    image: mcr.microsoft.com/mssql/server:2022-latest
    hostname: sqlserver-source
    container_name: sqlserver-source
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword123!"
      MSSQL_PID: Developer
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - sqlserver-source-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPassword123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Target SQL Server — the JDBC sink writes the replicated rows here
  sqlserver-target:
    image: mcr.microsoft.com/mssql/server:2022-latest
    hostname: sqlserver-target
    container_name: sqlserver-target
    ports:
      - "1434:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword123!"
      MSSQL_PID: Developer
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - sqlserver-target-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPassword123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Kafka UI — optional, browse topics/connectors at http://localhost:8080
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    hostname: kafka-ui
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: kafka-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083

volumes:
  kafka-data:
  sqlserver-source-data:
  sqlserver-target-data:

networks:
  default:
    name: debezium-jdbc-sink-demo
