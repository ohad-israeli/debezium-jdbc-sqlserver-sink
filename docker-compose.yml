services:
  # Self-managed Kafka Connect worker, wired to CONFLUENT CLOUD.
  # Kafka, Schema Registry, and the UI all live in Confluent Cloud now —
  # only Connect (hosting the two Debezium connectors) and the two SQL Servers
  # run locally. All Confluent Cloud credentials come from .env (never committed);
  # connector configs reference them via the env config provider (${env:...}).
  kafka-connect:
    image: confluentinc/cp-kafka-connect:8.2.1
    hostname: kafka-connect
    container_name: kafka-connect
    depends_on:
      sqlserver-source:
        condition: service_healthy
      sqlserver-target:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      # --- connect to Confluent Cloud ---
      CONNECT_BOOTSTRAP_SERVERS: ${CC_BOOTSTRAP}
      CONNECT_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_SASL_MECHANISM: PLAIN
      CONNECT_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="${CC_API_KEY}" password="${CC_API_SECRET}";
      CONNECT_PRODUCER_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_PRODUCER_SASL_MECHANISM: PLAIN
      CONNECT_PRODUCER_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="${CC_API_KEY}" password="${CC_API_SECRET}";
      CONNECT_CONSUMER_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_CONSUMER_SASL_MECHANISM: PLAIN
      CONNECT_CONSUMER_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="${CC_API_KEY}" password="${CC_API_SECRET}";

      # --- Connect worker internals (Confluent Cloud requires RF=3) ---
      CONNECT_GROUP_ID: debezium-jdbc-cc
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect

      # --- Avro against Confluent Cloud Schema Registry (basic auth) ---
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: ${CC_SR_URL}
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: ${CC_SR_URL}
      CONNECT_KEY_CONVERTER_BASIC_AUTH_CREDENTIALS_SOURCE: USER_INFO
      CONNECT_VALUE_CONVERTER_BASIC_AUTH_CREDENTIALS_SOURCE: USER_INFO
      CONNECT_KEY_CONVERTER_BASIC_AUTH_USER_INFO: ${CC_SR_API_KEY}:${CC_SR_API_SECRET}
      CONNECT_VALUE_CONVERTER_BASIC_AUTH_USER_INFO: ${CC_SR_API_KEY}:${CC_SR_API_SECRET}

      # --- env config provider: lets connector JSON use ${env:CC_*} without
      #     baking secrets into the committed config files ---
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      CONNECT_CONFIG_PROVIDERS_ENV_PARAM_ALLOWLIST_PATTERN: "CC_.*"

      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components,/usr/local/share/kafka/plugins"
      CONNECT_LOG4J_LOGGERS: org.reflections=ERROR

      # secrets exposed to the container so the env provider + schema-history SASL
      # can read them (sourced from .env by docker compose, not from git)
      CC_BOOTSTRAP: ${CC_BOOTSTRAP}
      CC_API_KEY: ${CC_API_KEY}
      CC_API_SECRET: ${CC_API_SECRET}
      CC_SR_URL: ${CC_SR_URL}
      CC_SR_API_KEY: ${CC_SR_API_KEY}
      CC_SR_API_SECRET: ${CC_SR_API_SECRET}
    volumes:
      # Debezium JDBC sink (not on Confluent Hub) — extracted on the host by
      # scripts/prepare-plugins.sh and mounted onto the Connect plugin path.
      - ./connect-plugins:/usr/local/share/kafka/plugins
    command:
      - bash
      - -c
      - |
        set -e
        echo "Installing Debezium SQL Server source connector (CDC)..."
        confluent-hub install --no-prompt debezium/debezium-connector-sqlserver:latest
        echo "Installing Avro converter..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-avro-converter:8.2.1
        echo "Starting Kafka Connect... (Debezium JDBC sink is mounted from ./connect-plugins)"
        /etc/confluent/docker/run
    healthcheck:
      test: curl --fail http://localhost:8083/connectors
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  # Source SQL Server — stands in for the on-premises database (CDC enabled).
  sqlserver-source:
    image: mcr.microsoft.com/mssql/server:2022-latest
    hostname: sqlserver-source
    container_name: sqlserver-source
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword123!"
      MSSQL_PID: Developer
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - sqlserver-source-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPassword123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Target SQL Server — stands in for Amazon RDS for SQL Server.
  sqlserver-target:
    image: mcr.microsoft.com/mssql/server:2022-latest
    hostname: sqlserver-target
    container_name: sqlserver-target
    ports:
      - "1434:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword123!"
      MSSQL_PID: Developer
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - sqlserver-target-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPassword123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sqlserver-source-data:
  sqlserver-target-data:

networks:
  default:
    name: debezium-jdbc-cc-demo
